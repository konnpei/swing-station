name: Refresh Screener Only

# 監視銘柄全体をRSI/MA25乖離/BB位置/出来高でスコア化する軽量スクリーナー。
# Claude APIもDiscordも使わないため、何度実行してもコストや重複投稿の心配がない。

on:
  schedule:
    - cron: '0 20 * * 0-4'
    - cron: '40 2 * * 1-5'
    - cron: '15 7 * * 1-5'
  workflow_dispatch:

jobs:
  screener:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests yfinance pandas numpy
      - run: python scripts/refresh_screener.py
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
