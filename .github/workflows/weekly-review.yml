name: Weekly Review

# 実行予定は土曜5:30 JST（金曜20:30 UTC）。GitHub Actionsのスケジュール遅延（実測1時間程度）を
# 見込んで1時間早めに予約し、実際の着地が6:30 JST前後になるよう調整している。

on:
  schedule:
    - cron: '30 20 * * 5'
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic requests
      - run: python scripts/weekly_review.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_MAIN: ${{ secrets.DISCORD_WEBHOOK_MAIN }}
          GH_PAT: ${{ secrets.GH_PAT }}
