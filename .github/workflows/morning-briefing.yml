name: swing-station 自動配信

on:
  schedule:
    - cron: '30 21 * * 0-4'
  workflow_dispatch:

jobs:
  deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: install
        run: pip install anthropic requests matplotlib pandas numpy Pillow yfinance
      - name: font
        run: sudo apt-get install -y fonts-noto-cjk -q
      - name: run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_MAIN: ${{ secrets.DISCORD_WEBHOOK_MAIN }}
