name: Morning Briefing

on:
  schedule:
    - cron: '30 21 * * 0-4'
  workflow_dispatch:

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic requests matplotlib pandas numpy Pillow yfinance
      - run: sudo apt-get install -y fonts-noto-cjk -q
      - run: python scripts/run_with_log.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_MAIN: ${{ secrets.DISCORD_WEBHOOK_MAIN }}
          GH_PAT: ${{ secrets.GH_PAT }}
