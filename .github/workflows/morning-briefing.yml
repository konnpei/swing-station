name: Morning Briefing

# 実行予定は5:30 JST（20:30 UTC）。GitHub Actionsのスケジュール実行は
# 実測で平均1時間ほど遅れる傾向があるため、1時間早めに予約することで
# 実際の着地が6:30 JST前後になるよう調整している。

on:
  schedule:
    - cron: '30 20 * * 0-4'
  workflow_dispatch:

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic requests matplotlib pandas numpy Pillow yfinance jpholiday
      - run: sudo apt-get install -y fonts-noto-cjk -q
      - run: python scripts/run_with_log.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_MAIN: ${{ secrets.DISCORD_WEBHOOK_MAIN }}
          GH_PAT: ${{ secrets.GH_PAT }}
