name: swing-station 自動配信

on:
  schedule:
    # 朝刊 JST 6:30 = UTC 21:30（前日）
    - cron: '30 21 * * 0-4'
  workflow_dispatch:

jobs:
  deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストールする
        run: |
          pip install \
            anthropic \
            requests \
            matplotlib \
            pandas \
            numpy \
            Pillow \
            yfinance

      - name: フォントをインストール
        run: |
          sudo apt-get install -y fonts-noto-cjk -q
          fc-cache -fv

      - name: 朝刊 — 全素材生成 & Discord配信
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_MAIN: ${{ secrets.DISCORD_WEBHOOK_MAIN }}
        run: python scripts/morning_briefing.py
