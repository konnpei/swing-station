name: TMP Volume Test (delete after use)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance pandas numpy
      - run: |
          cd scripts
          python3 -c "
          from market_data import fetch_volume_history
          import json
          items = fetch_volume_history()
          print(json.dumps(items, ensure_ascii=False, indent=2))
          "
