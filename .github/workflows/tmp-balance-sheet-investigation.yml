name: TMP Balance Sheet Investigation

# 一時調査用ワークフロー。ネットキャッシュ比率計算に必要なB/S項目が
# J-Quants/yfinanceから取得できるか検証する。調査後に削除する。

on:
  workflow_dispatch:

jobs:
  investigate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests yfinance pandas
      - run: python scripts/tmp_balance_sheet_investigation.py
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
