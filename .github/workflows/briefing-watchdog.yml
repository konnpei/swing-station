name: Briefing Watchdog

# 平日8:30 JST（想定実行6:30の2時間後）に、その日のMorning Briefingが実際に
# 実行されたか確認する。未実行ならworkflow_dispatchで自動的に再実行し、Discordに通知する。
# バッファを2時間と広めに取っているのは、GitHub Actionsのスケジュール実行が
# 1時間近く遅れることがあり、短いバッファだと「単なる遅延」を「未実行」と誤判定して
# 二重配信を招くため。

on:
  schedule:
    - cron: '30 23 * * 0-4'
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python scripts/briefing_watchdog.py
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DISCORD_WEBHOOK_MAIN: ${{ secrets.DISCORD_WEBHOOK_MAIN }}
