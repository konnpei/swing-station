name: Briefing Watchdog

# 平日7:00 JST に、その日のMorning Briefingが実際に実行されたか確認する。
# Morning Briefingの実行予定は5:30 JSTだが、GitHub Actionsのスケジュール遅延
# （実測1時間程度）を見込んで、実際の着地は6:30 JST前後を想定している。
# 未実行ならworkflow_dispatchで自動的に再実行し、Discordに通知する。

on:
  schedule:
    - cron: '0 22 * * 0-4'
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python scripts/briefing_watchdog.py
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          DISCORD_WEBHOOK_MAIN: ${{ secrets.DISCORD_WEBHOOK_MAIN }}
