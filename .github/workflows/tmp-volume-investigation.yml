name: TMP Volume Investigation (delete after use)

on:
  workflow_dispatch:

jobs:
  investigate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance pandas
      - run: python scripts/tmp_volume_investigation.py
